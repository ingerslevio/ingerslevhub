name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: familyhub
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5440:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/api/package-lock.json

      - name: Install API dependencies
        run: npm ci
        working-directory: src/api

      - name: Run migrations
        run: npm run db:migrate
        working-directory: src/api
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5440/familyhub

      - name: Run tests
        run: npm test
        working-directory: src/api
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5440/familyhub

  web-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: src/web

      - name: Build web
        run: npm run build
        working-directory: src/web
